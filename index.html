<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refrigesa · Ranking de Prospecção Ativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1f33; --panel:#142a45; --panel-2:#1b3455; --line:#2b4a6d;
  --cyan:#3ba9d5; --cyan-dim:#2c85ab; --red:#d93b3b;
  --txt:#eaf1f7; --muted:#8fa3b8; --gold:#e9c46a; --silver:#c9cdd6; --bronze:#d69a6a;
  --ok:#37b56b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--navy); color:var(--txt);
  font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;
  background-image:radial-gradient(circle at 85% -10%, rgba(59,169,213,.10), transparent 45%),
                   radial-gradient(circle at 0% 100%, rgba(217,59,59,.06), transparent 40%);
}
.topbar{height:6px;display:flex}
.topbar i{flex:1}.topbar i:nth-child(1){background:var(--red)}.topbar i:nth-child(2){background:var(--cyan)}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px 70px}

header{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:24px 0 18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.mark{width:44px;height:44px;border-radius:11px;background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));
  display:grid;place-items:center;color:#062033;font-weight:900;font-size:22px;box-shadow:0 6px 18px rgba(59,169,213,.35)}
.wm b{display:block;font-weight:900;font-size:20px;letter-spacing:.06em;line-height:1}
.wm span{display:block;font-size:9.5px;font-weight:700;color:var(--cyan);letter-spacing:.34em;margin-top:3px}
.htitle{text-align:right}
.htitle h1{font-size:15px;font-weight:800;letter-spacing:.02em}
.htitle p{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin-top:2px}

.metabar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:linear-gradient(90deg,var(--panel),var(--panel-2));
  border:1px solid var(--line);border-radius:16px;padding:16px 20px;margin:6px 0 18px}
.metabar .big{font-size:15px;font-weight:700}
.metabar .big b{color:var(--cyan)}
.metabar .big u{color:var(--red);text-decoration:none;font-weight:900}
.metabar .sub{color:var(--muted);font-size:12.5px;font-weight:500;margin-left:auto}

.controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.field{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 12px}
.field label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
select{background:var(--panel-2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 12px;
  font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;outline:none}
select:focus{border-color:var(--cyan)}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--cyan);color:#062033;border:none;border-radius:12px;
  padding:9px 16px;font-family:inherit;font-weight:800;font-size:13.5px;cursor:pointer;transition:.15s}
.btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.6;cursor:default}
.btn svg{width:16px;height:16px}.btn.spin svg{animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.status{font-size:12px;color:var(--muted);font-weight:600;margin-left:auto}
.status.err{color:var(--red)}.status a{color:var(--cyan);cursor:pointer;text-decoration:underline}
.demoTag{font-size:11px;font-weight:800;color:#062033;background:var(--gold);padding:3px 9px;border-radius:20px;letter-spacing:.04em}

/* podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;margin:6px 0 26px;min-height:240px}
.col{display:flex;flex-direction:column;align-items:center;width:200px;max-width:31%}
.avatar{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:19px;
  color:#062033;margin-bottom:9px;border:3px solid var(--navy)}
.c1 .avatar{background:var(--gold);width:70px;height:70px;font-size:22px;box-shadow:0 0 0 3px var(--gold)}
.c2 .avatar{background:var(--silver)}.c3 .avatar{background:var(--bronze)}
.col .nm{font-weight:800;font-size:13.5px;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col .pts{font-size:12px;color:var(--muted);margin:2px 0 8px}.col .pts b{color:var(--txt);font-size:15px}
.block{width:100%;border-radius:12px 12px 0 0;background:linear-gradient(180deg,var(--panel-2),var(--panel));
  border:1px solid var(--line);border-bottom:none;display:grid;place-items:center;height:0;transition:height .6s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden}
.c1 .block{background:linear-gradient(180deg,rgba(233,196,106,.22),var(--panel))}
.block .rank{font-size:40px;font-weight:900;color:var(--cyan);opacity:.9}
.c1 .block .rank{color:var(--gold)}
.medal{position:absolute;top:8px;font-size:16px}

.tblhead{display:flex;align-items:center;justify-content:space-between;margin:4px 0 10px}
.metaline{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(90deg,var(--panel),var(--panel-2));
  border:1px solid var(--line);border-radius:12px;padding:9px 16px;margin:0 0 16px;font-size:13px;font-weight:600;color:var(--muted)}
.metaline b{color:var(--cyan);font-size:17px;font-weight:900}
.metaline.hidden{display:none}
.tblhead h2{font-size:14px;font-weight:800;letter-spacing:.02em}
.tblhead .count{font-size:12px;color:var(--muted);font-weight:600}

.row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;background:var(--panel);
  border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:9px;transition:.15s}
.row:hover{border-color:var(--cyan-dim)}
.row.hit{border-color:rgba(55,181,107,.55);background:linear-gradient(90deg,rgba(55,181,107,.10),var(--panel))}
.pos{font-weight:900;font-size:17px;color:var(--muted);text-align:center}
.row.top .pos{color:var(--cyan)}
.who{display:flex;align-items:center;gap:12px;min-width:0}
.chip{width:38px;height:38px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);
  display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--cyan);flex-shrink:0}
.info{min-width:0;flex:1}
.name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.name small{color:var(--muted);font-weight:500;font-size:11.5px;margin-left:6px}
.bar{height:7px;background:var(--panel-2);border-radius:20px;margin-top:7px;overflow:hidden;position:relative}
.bar i{display:block;height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:width .8s cubic-bezier(.2,.8,.2,1)}
.row.hit .bar i{background:linear-gradient(90deg,#2b8f57,var(--ok))}
.score{text-align:right;min-width:96px}
.score b{font-size:18px;font-weight:900;display:block;line-height:1}
.score span{font-size:11px;color:var(--muted)}
.badge{display:inline-block;margin-top:4px;font-size:10.5px;font-weight:800;color:#04220f;background:var(--ok);padding:2px 8px;border-radius:20px}
.msg{text-align:center;color:var(--muted);padding:34px;background:var(--panel);border:1px dashed var(--line);border-radius:14px}

.legend{margin-top:30px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.legend h3{font-size:12px;font-weight:800;color:var(--cyan);letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px}
.legend .lg{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.legend .lg:last-child{border-bottom:none}
.legend .lg .act{color:var(--txt);font-weight:500}
.legend .lg .pt{font-weight:900;color:var(--cyan);background:var(--panel-2);border-radius:8px;padding:3px 11px;font-size:13px;white-space:nowrap}
.legend .foot{margin-top:12px;font-size:11.5px;color:var(--muted);line-height:1.5}
.legend .foot b{color:var(--txt)}

footer{margin-top:28px;text-align:center;color:var(--muted);font-size:11px;line-height:1.7}
footer b{color:var(--cyan)}
.setup{background:rgba(217,59,59,.10);border:1px solid rgba(217,59,59,.4);color:#ffd8d8;border-radius:14px;padding:14px 18px;margin:0 0 18px;font-size:13px;line-height:1.55;display:none}
.setup.show{display:block}
.setup b{color:#fff}
@media(max-width:560px){
  .htitle{text-align:left}.metabar .sub{margin-left:0}
  .row{grid-template-columns:1fr auto;gap:10px;padding:11px 12px}
  .score{min-width:74px}
}
</style>
</head>
<body>
<div class="topbar"><i></i><i></i></div>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="mark">❄</div>
      <div class="wm"><b>REFRIGESA</b><span>REFRIGERAÇÃO</span></div>
    </div>
    <div class="htitle">
      <h1>Ranking de Prospecção Ativa</h1>
      <p>Cada ponto conta · Bora pra rua</p>
    </div>
  </header>

  <div id="setup" class="setup"></div>

  <div class="controls">
    <div class="field">
      <label>Mês de referência</label>
      <select id="month"></select>
    </div>
    <button id="refresh" class="btn" title="Atualizar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Atualizar
    </button>
    <span class="status" id="status"><span id="statusTxt">Carregando…</span></span>
  </div>

  <div class="metaline" id="metaLine">Meta do mês: <b id="metaVal">—</b> pontos por técnico</div>

  <div class="tblhead">
    <h2>Pontuação por técnico</h2>
    <span class="count" id="count"></span>
  </div>
  <div id="list"></div>

  <div class="legend">
    <h3>Legenda de pontuação</h3>
    <div id="legendList"></div>
  </div>

</div>

<script>
/* ============================================================
   CONFIGURAÇÃO — cole o ID da planilha do Google Sheets aqui.
   O ID é a parte da URL entre /d/ e /edit:
   docs.google.com/spreadsheets/d/<<< ESTE PEDAÇO >>>/edit
   A planilha precisa estar como "qualquer pessoa com o link pode ver".
   ============================================================ */
const SHEET_ID   = '14u8C0zxcuGN3SMMk30k7PaHJuyh1SWzclKIXIvgOrlE';
const META  = 80;
const BONUS = 'R$ 400';

/* Legenda (espelha o guia). Se preferir, o dashboard também lê da aba Config. */
const LEGENDA = [
  ['Cartão de visitas entregue', 0.5],
  ['Contato do responsável obtido', 1.0],
  ['Orçamento ou Limpeza realizada na hora', 3.0],
  ['Novo serviço realizado (após negociação do Comercial)', 5.0],
];

/* Dados de exemplo (matriz já somada: [nome, total]) — usados só se a planilha não carregar. */
const DEMO = [
  ['Marcos Vinícius', 14], ['João Pedro', 11], ['Rafael Souza', 8.5],
  ['Anderson Lima', 4.5], ['Bruno Alves', 1.5],
];

let usingDemo = false;
const norm = s => (s==null?'':String(s)).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();
const fmt = n => (Math.round(n*10)/10).toLocaleString('pt-BR');
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
function compLabel(c){ const [y,m]=c.split('-'); return (MESES[(+m)-1]||m)+' / '+y; }
function initials(name){ const p=String(name).trim().split(/\s+/).filter(Boolean); return ((p[0]?.[0]||'')+(p[1]?.[0]||p[0]?.[1]||'')).toUpperCase(); }

/* ---------- gviz JSONP (sem CORS) ---------- */
// sheetName=null => lê a primeira aba (útil p/ planilha de aba única)
function fetchTab(sheetName){
  return new Promise((resolve,reject)=>{
    const name='__gviz_'+String(sheetName||'default').replace(/\W/g,'')+'_'+(fetchTab._n=(fetchTab._n||0)+1);
    const sc=document.createElement('script'); let done=false;
    const clean=()=>{ try{delete window[name]}catch(e){window[name]=undefined} if(sc.parentNode) sc.remove(); };
    const to=setTimeout(()=>{ if(done)return; done=true; clean(); reject(new Error('timeout')); },12000);
    window[name]=resp=>{ if(done)return; done=true; clearTimeout(to);
      try{
        const t=resp.table, rows=t.rows||[], cols=(t.cols||[]).map(c=>c.label||'');
        const cv=(r,i)=>{const c=r.c;return (c&&c[i]&&c[i].v!=null)?c[i].v:null;};
        resolve({cols, rows:rows.map(r=>cols.map((_,i)=>cv(r,i)))});
      }catch(e){reject(e)} finally{clean()}
    };
    sc.onerror=()=>{ if(done)return; done=true; clearTimeout(to); clean(); reject(new Error('load failed')); };
    const sheetParam = sheetName ? ('sheet='+encodeURIComponent(sheetName)+'&') : '';
    sc.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?'+sheetParam+'headers=0&tqx=responseHandler:'+name;
    document.head.appendChild(sc);
  });
}

let STATE = { byComp:{}, comps:[], roster:[] };

function dateToComp(v){
  if(v==null) return null;
  const s=String(v).trim(); let m;
  if((m=s.match(/^Date\((\d+),(\d+),(\d+)/)))                       return m[1]+'-'+String(+m[2]+1).padStart(2,'0'); // gviz (mês 0-based)
  if((m=s.match(/^(\d{4})-(\d{1,2})/)))                             return m[1]+'-'+String(+m[2]).padStart(2,'0');   // 2026-07-..
  if((m=s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/))){ let y=m[3]; if(y.length===2) y='20'+y; return y+'-'+String(+m[2]).padStart(2,'0'); } // dd/mm/aaaa
  return null;
}

// Log de prospecção: cada linha = 1 visita. Os Pontos valem p/ Técnico 1 E Técnico 2 (a dupla soma).
// Cabeçalho localizado dinamicamente (linha cujo col0 = "Data"); o mês vem da coluna Data. (headers=0)
function parseLog(tab){
  const rows=tab.rows;
  let h=rows.findIndex(r=>norm(r[0])==='data');
  if(h<0) h=rows.findIndex(r=>r.some(c=>norm(c).includes('tecnico')));
  if(h<0) h=0;
  const H=(rows[h]||[]).map(norm);
  const find=(...ks)=>H.findIndex(c=>ks.some(k=>c.includes(k)));
  const iData=find('data'), iT1=find('tecnico 1','tecnico1','tec 1'), iT2=find('tecnico 2','tecnico2','tec 2');
  let iP=find('ponto');
  if(iP<0){ const iStatus=find('status'); if(iStatus>0) iP=iStatus-1; }  // fallback: coluna de pontos fica antes de "Status" (título pode estar em branco)
  const byComp={}, roster=new Set();
  for(let k=h+1;k<rows.length;k++){
    const r=rows[k];
    const comp=dateToComp(iData>=0?r[iData]:null);
    const pts=+(iP>=0?r[iP]:0)||0;
    [iT1,iT2].forEach(ix=>{ if(ix<0) return; const nm=r[ix];
      if(nm==null||String(nm).trim()==='') return;
      const name=String(nm).trim(); roster.add(name);
      if(comp){ (byComp[comp]=byComp[comp]||{})[name]=(byComp[comp][name]||0)+pts; }
    });
  }
  // meta: procura uma célula que contenha "meta" e pega o próximo número na mesma linha
  let meta=null;
  for(const rr of rows){
    for(let j=0;j<rr.length;j++){
      if(norm(rr[j]).includes('meta')){
        for(let k=j+1;k<rr.length;k++){ const v=rr[k];
          if(v!=null && String(v).trim()!==''){ const n=parseFloat(String(v).replace(/[^0-9.,]/g,'').replace(',','.')); if(!isNaN(n)) meta=n; break; }
        }
        if(meta!=null) break;
      }
    }
    if(meta!=null) break;
  }
  STATE={ byComp, comps:Object.keys(byComp).sort().reverse(), roster:[...roster], meta };
}

/* ---------- render ---------- */
function render(){
  const sel=document.getElementById('month');
  const comp=sel.value || STATE.comps[0];

  const scores = (comp && STATE.byComp[comp]) ? {...STATE.byComp[comp]} : {};
  STATE.roster.forEach(n=>{ if(!(n in scores)) scores[n]=0; });   // todos aparecem, mesmo com 0
  let data=Object.entries(scores).map(([n,p])=>[n,p]).sort((a,b)=>b[1]-a[1]);
  const max=data.length ? Math.max(...data.map(d=>d[1]), 1) : 1;   // barra proporcional ao maior valor

  const metaLine=document.getElementById('metaLine');
  if(STATE.meta!=null){ document.getElementById('metaVal').textContent=fmt(STATE.meta); metaLine.classList.remove('hidden'); }
  else metaLine.classList.add('hidden');

  const list=document.getElementById('list'); list.innerHTML='';
  document.getElementById('count').textContent = data.length? (data.length+' técnicos'):'';
  if(!data.length){ list.innerHTML='<div class="msg">Nenhum ponto lançado para este mês ainda.</div>'; return; }
  data.forEach(d=>{
    const pct=Math.min(100, d[1]/max*100);
    const row=document.createElement('div'); row.className='row';
    row.innerHTML='<div class="who"><div class="chip">'+initials(d[0])+'</div>'+
      '<div class="info"><div class="name">'+d[0]+'</div>'+
      '<div class="bar"><i data-w="'+pct+'"></i></div></div></div>'+
      '<div class="score"><b>'+fmt(d[1])+'</b><span>pontos</span></div>';
    list.appendChild(row);
  });
  setTimeout(()=>list.querySelectorAll('.bar i').forEach(b=>b.style.width=b.dataset.w+'%'),150);
}

function fillMonths(){
  const sel=document.getElementById('month'); const cur=sel.value;
  sel.innerHTML='';
  let comps = STATE.comps.slice();
  if(!comps.length){ const d=new Date(); comps=[d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')]; }
  comps.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=compLabel(c); sel.appendChild(o); });
  if(comps.includes(cur)) sel.value=cur;
}

/* ---------- carregar ---------- */
const btn=document.getElementById('refresh'), stEl=document.getElementById('status'), stTxt=document.getElementById('statusTxt');
const nowTime=()=>new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
function setStatus(t,err){ stEl.classList.toggle('err',!!err); stTxt.innerHTML=t; }
function setBusy(b){ btn.disabled=b; btn.classList.toggle('spin',b); }
function renderLegend(){ const el=document.getElementById('legendList'); el.innerHTML=LEGENDA.map(([a,p])=>
  '<div class="lg"><span class="act">'+a+'</span><span class="pt">'+fmt(p)+' pt'+(p>1?'s':'')+'</span></div>').join(''); }

function loadDemo(reason){
  usingDemo=true;
  const d=new Date(); const comp=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  STATE={ byComp:{[comp]:{}}, comps:[comp], roster:[] };
  DEMO.forEach(([n,t])=>{ STATE.byComp[comp][n]=t; STATE.roster.push(n); });
  fillMonths(); render();
  document.getElementById('setup').className='setup show';
  document.getElementById('setup').innerHTML='<b>Modo demonstração.</b> '+reason+' Assim que a planilha estiver pública, o ranking real aparece aqui automaticamente.';
  setStatus('Dados de exemplo');
}

async function loadLive(){
  if(SHEET_ID==='COLE_O_ID_DA_PLANILHA_AQUI'){ loadDemo('A planilha ainda não foi conectada.'); return; }
  setBusy(true); setStatus('Atualizando…');
  try{
    parseLog(await fetchTab(null));   // 1ª aba
    usingDemo=false;
    document.getElementById('setup').className='setup';
    fillMonths(); render();
    setStatus('Atualizado '+nowTime());
  }catch(err){
    console.error(err);
    setStatus('Não carregou — verifique se a planilha está como "qualquer pessoa com o link pode ver" · <a id="rt">tentar novamente</a>', true);
    const r=document.getElementById('rt'); if(r) r.onclick=loadLive;
  }finally{ setBusy(false); }
}

document.getElementById('month').addEventListener('change', render);
btn.addEventListener('click', loadLive);
renderLegend();
loadLive();
</script>
</body>
</html>
